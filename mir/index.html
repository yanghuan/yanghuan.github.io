  .d4-panel{
    position:absolute; background:linear-gradient(180deg,#1a130d 0%,#0c0805 100%);
    border:2px solid #5a3e22; border-radius:4px;
    box-shadow:0 0 0 1px #2a1d10 inset, 0 8px 32px rgba(0,0,0,.8);
    color:#e8d8c0; font-family:Georgia,"Times New Roman",serif;
    user-select:none; pointer-events:auto;
  }
  .d4-panel-title{
    padding:8px 12px; font-size:15px; letter-spacing:2px; text-align:center;
    color:#f0e0c0; border-bottom:1px solid #4a3020;
    background:linear-gradient(180deg,#3a2410,#1a120a);
    text-shadow:0 0 6px rgba(200,160,80,.4);
  }
  .d4-close{
    position:absolute; top:6px; right:8px; width:20px; height:20px;
    line-height:18px; text-align:center; cursor:pointer; color:#a08060;
    border:1px solid #4a3020; border-radius:3px; font-size:14px;
  }
  .d4-close:hover{ color:#ffb060; border-color:#8a5a2a; }

  /* 物品格 */
  .d4-slot{
    width:44px; height:44px; position:relative;
    background:linear-gradient(180deg,#0a0705,#15100a);
    border:1px solid #3a2a18; border-radius:3px;
    display:flex; align-items:center; justify-content:center;
    cursor:default; overflow:hidden;
  }
  .d4-slot.has-item{ cursor:pointer; border-color:#6a4a22; }
  .d4-slot.has-item:hover{ border-color:#c8902a; box-shadow:0 0 8px rgba(200,144,42,.5) inset; }
  .d4-slot.empty{ background:rgba(0,0,0,.3); }
  .d4-slot-icon{
    width:34px; height:34px; border-radius:3px; display:flex;
    align-items:center; justify-content:center;
    font-size:18px; color:#fff; text-shadow:0 1px 2px #000;
  }
  .d4-slot-qty{
    position:absolute; right:2px; bottom:0px; font-size:12px; color:#f0e0c0;
    text-shadow:0 1px 2px #000,0 0 2px #000; font-weight:bold;
  }
  .d4-durbar{
    position:absolute; left:3px; right:3px; bottom:2px; height:3px;
    background:#3a0a0a; border-radius:1px; overflow:hidden;
  }
  .d4-durbar > i{ display:block; height:100%; background:linear-gradient(90deg,#8a1a1a,#d83a3a); }

  /* tooltip */
  .d4-tooltip{
    position:fixed; z-index:9999; max-width:260px; padding:8px 10px;
    background:#0a0604; border:1px solid #6a4a22; border-radius:3px;
    color:#e8d8c0; font-size:12px; line-height:1.5; pointer-events:none;
    box-shadow:0 4px 16px rgba(0,0,0,.9);
  }
  .d4-tooltip .name{ font-size:14px; color:#f0c060; margin-bottom:4px; }
  .d4-tooltip .stat{ color:#9ad060; }
  .d4-tooltip .desc{ color:#a09080; margin-top:4px; font-style:italic; }
  .d4-tooltip .dur{ color:#d06060; }
  .d4-tooltip .price{ color:#c8a040; }

  /* HUD */
  .d4-hud{ position:absolute; left:16px; bottom:16px; display:flex; align-items:flex-end; gap:10px; pointer-events:none; }
  .d4-orb{ width:78px; height:78px; border-radius:50%; position:relative;
    border:2px solid #4a3020; box-shadow:0 0 0 2px #1a120a inset,0 4px 12px rgba(0,0,0,.7);
    overflow:hidden; background:#0a0604;
  }
  .d4-orb-fill{ position:absolute; left:0; right:0; bottom:0; transition:height .25s ease; }
  .d4-orb-hp .d4-orb-fill{ background:radial-gradient(ellipse at 50% 30%,#e04040 0%,#7a1010 70%,#3a0606 100%); }
  .d4-orb-mp .d4-orb-fill{ background:radial-gradient(ellipse at 50% 30%,#4080e0 0%,#103a7a 70%,#06133a 100%); }
  .d4-orb-val{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:14px; font-weight:bold; color:#fff; text-shadow:0 1px 3px #000; }
  .d4-hud-side{ display:flex; flex-direction:column; gap:6px; padding-bottom:6px; }
  .d4-hud-row{ font-size:13px; color:#e8d8c0; text-shadow:0 1px 2px #000; }
  .d4-hud-row b{ color:#f0c060; }
  .d4-hud-row .gold{ color:#e8c040; }
  .d4-expbar{ width:200px; height:8px; background:#1a120a; border:1px solid #4a3020; border-radius:2px; overflow:hidden; }
  .d4-expbar > i{ display:block; height:100%; background:linear-gradient(90deg,#6a8a2a,#a8d040); }
  .d4-hud-topleft{ position:absolute; left:16px; top:12px; text-align:left; font-size:12px;
    color:#a09080; text-shadow:0 1px 2px #000; pointer-events:none; }
  .d4-hud-topleft .hint{ color:#7a6a50; }

  /* 按钮 */
  .d4-btn{
    background:linear-gradient(180deg,#3a2410,#1a120a); border:1px solid #6a4a22;
    color:#e8d8c0; padding:5px 12px; border-radius:3px; cursor:pointer;
    font-family:Georgia,serif; font-size:13px;
  }
  .d4-btn:hover{ border-color:#c8902a; color:#ffb060; }
  .d4-btn:disabled{ opacity:.4; cursor:default; }
  .d4-btn-sell{ background:linear-gradient(180deg,#2a3a1a,#101a08); border-color:#4a6a22; }
  .d4-btn-buy{ background:linear-gradient(180deg,#3a2a10,#1a120a); }

  /* 商店三栏 */
  .d4-shop-body{ display:flex; gap:1px; background:#3a2a18; }
  .d4-shop-col{ flex:1; padding:8px; background:#0c0805; min-width:0; }
  .d4-shop-col h4{ font-size:12px; color:#a08060; margin:0 0 6px; letter-spacing:1px; text-align:center; }
  .d4-shop-row{ display:flex; align-items:center; gap:6px; padding:3px 4px; border-radius:2px; cursor:pointer; font-size:12px; }
  .d4-shop-row:hover{ background:#1a120a; }
  .d4-shop-row .nm{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .d4-shop-row .pr{ color:#e8c040; }

  /* toast */
  .d4-toast{ position:absolute; left:50%; top:60px; transform:translateX(-50%);
    background:#1a0a0a; border:1px solid #8a1a1a; color:#ffb060; padding:6px 16px;
    border-radius:3px; font-size:13px; pointer-events:none; opacity:0; transition:opacity .3s; z-index:10000;
  }
  .d4-toast.show{ opacity:1; }

  /* M4:角色选择面板 */
  .d4-jobselect{ width:720px; padding:18px 20px 16px; }
  .d4-jobselect-cards{ display:flex; gap:16px; margin-top:12px; }
  .d4-job-card{ flex:1; background:#1a1008; border:2px solid #4a3220; border-radius:4px;
    padding:14px 12px; cursor:pointer; transition:border-color .2s,background .2s; text-align:center;
    pointer-events:auto;
  }
  .d4-job-card:hover{ border-color:#c08040; background:#241608; }
  .d4-job-card.selected{ border-color:#ffa040; background:#2a1a08; }
  .d4-job-card .icon{ font-size:40px; line-height:1; margin-bottom:8px; }
  .d4-job-card .nm{ font-size:18px; color:#e0c080; letter-spacing:2px; margin-bottom:4px; }
  .d4-job-card .desc{ font-size:12px; color:#806040; line-height:1.5; min-height:48px; }
  .d4-job-card .stats{ font-size:11px; color:#a08060; margin-top:8px; border-top:1px solid #3a2a18; padding-top:6px; }

  /* M4:技能栏(底部中央) */
  .d4-skillbar{ position:absolute; left:50%; bottom:16px; transform:translateX(-50%);
    display:flex; gap:6px; pointer-events:auto; z-index:50;
  }
  .d4-skill-slot{ width:48px; height:48px; background:linear-gradient(180deg,#2a1a0c,#0e0804);
    border:1px solid #3a2a18; border-radius:3px; position:relative; cursor:pointer; overflow:hidden;
    display:flex; align-items:center; justify-content:center;
  }
  .d4-skill-slot:hover{ border-color:#7a5a30; }
  .d4-skill-slot.empty{ cursor:default; }
  .d4-skill-slot.empty:hover{ border-color:#3a2a18; }
  .d4-skill-slot.no-mp{ filter:grayscale(0.7) brightness(0.5); }
  .d4-skill-icon{ font-size:22px; line-height:1; text-shadow:0 0 6px currentColor; }
  .d4-skill-key{ position:absolute; top:1px; left:3px; font-size:10px; color:#806040; }
  .d4-skill-cd{ position:absolute; inset:0; background:rgba(0,0,0,0.65);
    display:flex; align-items:center; justify-content:center; color:#fff; font-size:14px; font-weight:bold;
  }
  .d4-skill-cd-bar{ position:absolute; left:0; right:0; bottom:0; background:rgba(20,40,80,0.5); }

  /* M5:小地图(右上角) */
  .d4-minimap{ position:absolute; right:16px; top:12px; width:180px; height:180px;
    background:#0a0604; border:2px solid #4a3020; border-radius:4px;
    box-shadow:0 0 0 1px #2a1d10 inset,0 4px 16px rgba(0,0,0,.8);
    pointer-events:none; overflow:hidden;
  }
  .d4-minimap-canvas{ display:block; width:180px; height:180px; }
  .d4-minimap-name{ position:absolute; left:0; right:0; bottom:4px; text-align:center;
    font-size:12px; color:#f0e0c0; text-shadow:0 1px 2px #000,0 0 4px #000;
    font-family:Georgia,serif; letter-spacing:1px;
  }

  /* M-TOUCH:商店面板数量步进器(批量交易) */
  .d4-qty{ display:flex; align-items:center; gap:4px; }
  .d4-step{ width:24px; height:24px; border-radius:3px; border:1px solid #6a4a22;
    background:linear-gradient(180deg,#2a1a0c,#0e0804); color:#e8d8c0; cursor:pointer;
    font-size:15px; line-height:1; display:flex; align-items:center; justify-content:center;
  }
  .d4-step:active{ border-color:#ffa040; color:#ffb060; }
  .d4-qty-val{ min-width:22px; text-align:center; font-size:13px; color:#f0e0c0; }

  /* M-TOUCH:商店面板打开时隐藏小地图(全屏遮罩下无意义,且避免遮挡关闭按钮) */
  body.shop-open .d4-minimap{ display:none !important; }

  /* M-TOUCH:响应式 —— 触摸/窄屏下商店面板全屏化、三栏垂直堆叠、加大热区 */
  @media (max-width:820px), (pointer:coarse){
    .d4-shop{
      width:auto !important; left:0 !important; right:0 !important; top:0 !important; bottom:0 !important;
      transform:none !important; border-radius:0; border-width:0 0 2px; max-height:100vh; overflow:hidden;
      display:flex; flex-direction:column; z-index:200; position:fixed;
    }
    .d4-shop .d4-panel-title{ font-size:16px; padding:14px 12px; position:sticky; top:0; z-index:2; flex:0 0 auto; }
    .d4-shop .d4-close{ width:32px; height:32px; line-height:30px; font-size:22px; top:8px; right:10px; z-index:5; position:absolute; }
    .d4-shop-body{ flex-direction:column; gap:0; flex:1 1 auto; min-height:0; overflow:auto; -webkit-overflow-scrolling:touch; }
    .d4-shop-col{ border-bottom:1px solid #3a2a18; }
    .d4-shop-col h4{ font-size:14px; padding:6px 0; position:sticky; top:0; background:#0c0805; z-index:1; }
    .d4-shop-row{ padding:10px 6px; font-size:14px; gap:10px; }
    .d4-shop-row .nm{ flex:1; }
    .d4-shop-row .pr{ font-size:15px; min-width:54px; text-align:right; }
    .d4-shop-row .d4-slot-icon{ width:30px !important; height:30px !important; font-size:16px !important; }
    .d4-shop-row .d4-btn{ padding:8px 18px; font-size:15px; }
    .d4-shop-row button.d4-btn[disabled]{ opacity:.35; }
    .d4-shop > div:last-child{ padding:12px; font-size:14px; flex:0 0 auto; }
  }

  /* M-TOUCH:背包面板移动端全屏化 + 加大热区(复用 shop 同款滚动/关闭按钮方案) */
  body.inv-open .d4-minimap{ display:none !important; }
  @media (max-width:820px), (pointer:coarse){
    .d4-inv{
      width:auto !important; left:0 !important; right:0 !important; top:0 !important; bottom:0 !important;
      transform:none !important; border-radius:0; border-width:0 0 2px; max-height:100vh; overflow:hidden;
      display:flex; flex-direction:column; z-index:200; position:fixed;
    }
    .d4-inv .d4-panel-title{ font-size:16px; padding:14px 12px; position:sticky; top:0; z-index:2; flex:0 0 auto; }
    .d4-inv .d4-close{ width:32px; height:32px; line-height:30px; font-size:22px; top:8px; right:10px; z-index:5; position:absolute; }
    .d4-inv .d4-inv-grid{ flex:1 1 auto; min-height:0; overflow:auto; -webkit-overflow-scrolling:touch;
      grid-template-columns:repeat(5,1fr) !important; gap:10px !important; padding:14px !important; align-content:start; }
    .d4-inv .d4-slot{ width:100% !important; height:auto !important; aspect-ratio:1/1; }
    .d4-inv .d4-slot-icon{ width:60% !important; height:60% !important; font-size:22px !important; }
    .d4-inv .d4-slot-qty{ font-size:14px; }
    .d4-inv .d4-durbar{ bottom:6px; }
  }

  /* 调试监控面板 - 左上角热键提示下方，半透明，默认收起 */
  .d4-debug {
    position: absolute;
    left: 16px;
    top: 58px;
    font-size: 11px;
    color: #a09080;
    text-shadow: 0 1px 2px #000;
    pointer-events: auto;
    background: rgba(10, 6, 4, 0.82);
    border: 1px solid #4a3020;
    border-radius: 3px;
    min-width: 148px;
    box-shadow: 0 2px 8px rgba(0,0,0,.6);
    font-family: monospace;
  }
  .d4-debug-header {
    padding: 2px 8px;
    cursor: pointer;
    user-select: none;
    font-size: 11px;
    color: #c0a070;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .d4-debug-header:hover {
    color: #e8c080;
  }
  .d4-debug-body {
    padding: 3px 8px 5px;
    border-top: 1px solid #3a2a18;
    line-height: 1.35;
    white-space: pre;
    font-size: 10.5px;
    color: #a09080;
  }
  .d4-debug-row {
    display: flex;
    justify-content: space-between;
    gap: 8px;
  }
  .d4-debug-label { color: #7a6a50; }
  .d4-debug-val { color: #d0c0a0; font-weight: bold; }

  }

  .d4-touch-btn .lbl{ font-size:10px; margin-top:2px; color:#a08060; }
  .d4-touch-btn:active{ transform:scale(.92); border-color:#ffa040; box-shadow:0 0 14px rgba(255,160,64,.5); }

  .d4-gm{
    position:fixed; left:50%; top:50%; transform:translate(-50%,-50%);
    width:340px; max-height:80vh; overflow:auto; z-index:200;
    pointer-events:auto;
    background:linear-gradient(180deg,#140d06,#0a0603);
    border:2px solid #7a5a2c; border-radius:8px;
    box-shadow:0 12px 48px rgba(0,0,0,.85), 0 0 0 1px #2a1c0c inset;
    color:#e8d8c0; font-size:13px; user-select:none;
    animation:gmIn .18s ease-out;
  }
  @keyframes gmIn { from{ opacity:0; transform:translate(-50%,-46%) scale(.96);} to{ opacity:1; transform:translate(-50%,-50%) scale(1);} }
  .d4-gm-head{
    display:flex; align-items:center; justify-content:space-between;
    padding:8px 12px; background:linear-gradient(180deg,#3a2810,#1c1208);
    border-bottom:1px solid #5a3f1e; font-weight:bold; letter-spacing:1px;
  }
  .d4-gm-head .d4-gm-x{
    background:transparent; border:none; color:#c8a060; font-size:16px; cursor:pointer; line-height:1;
  }
  .d4-gm-head .d4-gm-x:hover{ color:#ff8060; }
  .d4-gm-body{ padding:10px 12px 14px; display:flex; flex-direction:column; gap:10px; }
  .d4-gm-sec{ display:flex; flex-direction:column; gap:6px; }
  .d4-gm-sec-t{ font-size:11px; color:#a08060; border-left:3px solid #7a5a2c; padding-left:6px; text-transform:uppercase; letter-spacing:1px; }
  .d4-gm-row{ display:flex; gap:6px; }
  .d4-gm-row .d4-gm-btn{ flex:1; }
  .d4-gm-btn{
    padding:8px 10px; border-radius:5px; cursor:pointer;
    background:linear-gradient(180deg,#2a1c0c,#140d06);
    border:1px solid #5a3f1e; color:#e8d8c0;
    transition:transform .08s, border-color .15s, box-shadow .15s, background .15s;
    text-align:center; white-space:nowrap;
  }
  .d4-gm-btn:hover{ border-color:#ffb060; background:linear-gradient(180deg,#3a2810,#1c1208); box-shadow:0 0 12px rgba(255,176,96,.25); }
  .d4-gm-btn:active{ transform:scale(.97); }
  .d4-gm-sel{
    flex:1; padding:7px 8px; border-radius:5px;
    background:#140d06; color:#e8d8c0; border:1px solid #5a3f1e; font-size:12px;
  }
  .d4-gm-input{
    flex:1; min-width:0; padding:7px 8px; border-radius:5px;
    background:#140d06; color:#e8d8c0; border:1px solid #5a3f1e; font-size:12px;
    outline:none; transition:border-color .15s, box-shadow .15s;
  }
  .d4-gm-input:focus{ border-color:#ffb060; box-shadow:0 0 10px rgba(255,176,96,.2); }
  /* 自定义地图下拉 */

  .d4-gm-dd-btn{
    display:flex; align-items:center; justify-content:space-between; gap:6px;
    padding:7px 8px; border-radius:5px; cursor:pointer; user-select:none;
    background:#140d06; color:#e8d8c0; border:1px solid #5a3f1e; font-size:12px;
    transition:border-color .15s, box-shadow .15s;
  }
  .d4-gm-dd-btn:hover{ border-color:#ffb060; box-shadow:0 0 10px rgba(255,176,96,.2); }
  .d4-gm-dd-label{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .d4-gm-dd-caret{ color:#a08060; font-size:11px; }
  .d4-gm-dd-menu{
    display:none; position:absolute; left:0; right:0; top:calc(100% + 4px); z-index:210;
    max-height:200px; overflow:auto; padding:4px;

  }
  .d4-gm-dd-opt{
